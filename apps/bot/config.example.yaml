camera:
  index: 0
  width: 424
  height: 240
  fps: 15

detector:
  enabled: true
  model_path: yolo26n-seg.pt
  conf_threshold: 0.25
  iou_threshold: 0.45
  imgsz: 640
  retina_masks: true
  infer_every_n_frames_default: 1
  target_class_default: all

tracking:
  ema_alpha: 0.35
  tracking_timeout_ms: 1200
  kp: 6.0
  deadband: 0.08
  area_min: 350

color_tracking:
  target_color_default: blue

render:
  overlay_alpha: 0.45
  draw_bbox_default: false
  draw_mask_default: true
  draw_contour_default: true
  draw_label_default: true

servo:
  enabled: true
  center_angle: 90
  min_angle: 60
  max_angle: 120
  write_interval_ms: 80
  min_angle_step: 1.0
  target_file: /tmp/kairos_servo_target

web:
  host: 0.0.0.0
  port: 8080
  jpeg_quality: 55
  stream_sleep_ms: 50
